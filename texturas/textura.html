<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Texturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a47de8;
            --primary-dark: #7c5cbf;
            --accent: #c9a7ff;
            --bg-dark: #0d0d1a;
            --card-bg: rgba(26, 26, 50, 0.85);
            --card-bg-hover: rgba(35, 35, 65, 0.95);
            --border: rgba(124, 92, 191, 0.2);
            --border-hover: rgba(164, 125, 232, 0.5);
            --modal-bg: rgba(13, 13, 26, 0.97);
            --text-muted: #888aaa;
            --text-dim: #555577;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(124, 92, 191, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(164, 125, 232, 0.04) 0%, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(10,10,20,0.95), transparent);
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(164, 125, 232, 0.35);
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1.5px solid rgba(124, 92, 191, 0.25);
            background: rgba(20, 20, 40, 0.8);
            color: white;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput::placeholder { color: var(--text-muted); }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(164, 125, 232, 0.18);
        }

        .stats {
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Press Start 2P', cursive;
        }

        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 30px;
            width: 100%;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: rgba(164, 125, 232, 0.25) transparent;
        }

        .content-wrapper::-webkit-scrollbar { width: 6px; }
        .content-wrapper::-webkit-scrollbar-track { background: transparent; }
        .content-wrapper::-webkit-scrollbar-thumb {
            background: rgba(164, 125, 232, 0.2);
            border-radius: 10px;
        }
        .content-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(164, 125, 232, 0.45);
        }
        .content-wrapper::-webkit-scrollbar-button,
        .content-wrapper::-webkit-scrollbar-corner { display: none; background: transparent; }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .file-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .file-card:hover {
            transform: translateY(-5px);
            background: var(--card-bg-hover);
            border-color: var(--border-hover);
            box-shadow: 0 12px 40px rgba(124, 92, 191, 0.2);
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .file-display-name {
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .file-raw-name {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-family: monospace;
        }

        .btn-download {
            background: var(--primary-dark);
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(164, 125, 232, 0.35);
            cursor: pointer;
            width: 100%;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 0 15px rgba(124, 92, 191, 0.15);
        }

        .btn-download:hover {
            background: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 22px rgba(164, 125, 232, 0.35);
            transform: scale(1.02);
        }

        .btn-download:active { transform: translateY(2px); }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1.5px solid rgba(164, 125, 232, 0.4);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 0 60px rgba(124, 92, 191, 0.25);
        }

        .modal-icon { font-size: 60px; margin-bottom: 20px; display: block; animation: bounce 0.5s ease; }

        .modal-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 15px;
            text-shadow: 0 0 12px rgba(164, 125, 232, 0.4);
        }

        .modal-filename {
            background: rgba(164, 125, 232, 0.06);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            color: #fff;
            word-break: break-all;
            border: 1px solid var(--border);
        }

        .modal-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        .modal-btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .modal-btn:active { transform: translateY(0); }

        .btn-minecraft { background: var(--primary-dark); color: white; border: 1px solid rgba(164,125,232,0.4); }
        .btn-custom    { background: #2d3a6b; color: white; border: 1px solid rgba(100,130,255,0.3); }
        .btn-cancel    { background: #3a1a1a; color: #ff6b6b; border: 1px solid rgba(231,76,60,0.3); }

        .modal-footer { margin-top: 15px; font-size: 11px; color: var(--text-muted); }

        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bounce  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #loader {
            width: 36px; height: 36px;
            background-color: var(--primary-dark);
            margin: 50px auto;
            animation: cube-rotate 1.2s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(124, 92, 191, 0.5);
            border-radius: 4px;
        }

        @keyframes cube-rotate {
            0%   { transform: perspective(120px) rotateX(0deg) rotateY(0deg); }
            50%  { transform: perspective(120px) rotateX(-180.1deg) rotateY(0deg); }
            100% { transform: perspective(120px) rotateX(-180deg) rotateY(-179.9deg); }
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--primary-dark);
            color: white;
            text-align: center;
            border-radius: 10px;
            padding: 12px 20px;
            position: fixed;
            left: 50%; bottom: 30px;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: bold;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(164, 125, 232, 0.35);
            box-shadow: 0 4px 20px rgba(124, 92, 191, 0.3);
        }

        #toast.show { visibility: visible; opacity: 1; }

        @media (max-width: 600px) {
            h1 { font-size: 16px; }
            .catalog-grid { grid-template-columns: 1fr; }
            .modal-content { width: 85%; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Pesquisar</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar textura...">
        <div class="stats" id="fileCount">Lendo arquivos...</div>
    </div>
</div>

<div class="content-wrapper">
    <div id="loader"></div>
    <div id="catalog" class="catalog-grid"></div>
</div>

<!-- MODAL DE DOWNLOAD -->
<div id="downloadModal" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-icon">📥</span>
        <h2 class="modal-title">ESCOLHA O DESTINO</h2>
        <div id="modalFilename" class="modal-filename"></div>
        <div class="modal-buttons">
            <button id="saveMinecraftBtn" class="modal-btn btn-minecraft">
                📦 SALVAR EM .MINECRAFT
            </button>
            <button id="saveCustomBtn" class="modal-btn btn-custom">
                📁 SALVAR EM OUTRO LUGAR
            </button>
        </div>
        <div class="modal-footer">
            Selecione onde deseja salvar a textura
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const CONFIG = {
        owner: 'kauan9192gg',
        repo: 'sj_minecraft',
        path: 'texturas'
    };

    let allFiles = [];
    let currentDownloadUrl = '';
    let currentFilename = '';

    function showDownloadModal(url, filename) {
        currentDownloadUrl = url;
        currentFilename = filename;
        document.getElementById('modalFilename').innerText = filename;
        document.getElementById('downloadModal').style.display = 'flex';
        document.querySelector('.content-wrapper').style.filter = 'blur(4px)';
        document.querySelector('.header').style.filter = 'blur(4px)';
    }

    function closeModal() {
        document.getElementById('downloadModal').style.display = 'none';
        document.querySelector('.content-wrapper').style.filter = 'none';
        document.querySelector('.header').style.filter = 'none';
    }

    async function downloadToMinecraft() {
        try {
            closeModal();
            showToast("⏬ Baixando para Minecraft...", "#a47de8");
            await window.pywebview.api.baixar_textura(currentDownloadUrl, currentFilename, "minecraft");
        } catch (error) {
            console.error("Erro no download:", error);
            showToast("❌ Erro ao iniciar download: " + error, "#e74c3c");
        }
    }

    async function downloadCustom() {
        try {
            closeModal();
            showToast("⏬ Escolha onde salvar...", "#a47de8");
            await window.pywebview.api.baixar_textura(currentDownloadUrl, currentFilename, "custom");
        } catch (error) {
            console.error("Erro no download:", error);
            showToast("❌ Erro ao iniciar download: " + error, "#e74c3c");
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('downloadModal').style.display === 'flex') {
            closeModal();
        }
    });

    document.getElementById('downloadModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.getElementById('saveMinecraftBtn').addEventListener('click', downloadToMinecraft);
    document.getElementById('saveCustomBtn').addEventListener('click', downloadCustom);

    function showToast(msg, color = "#a47de8") {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.style.color = "white";
        toast.className = "show";
        setTimeout(() => {
            toast.className = toast.className.replace("show", "");
        }, 3000);
    }

    function sanitizeName(name) {
        let clean = name;
        clean = clean.replace(/\.[^/.]+$/, "");
        clean = clean.replace(/§./g, "");
        clean = clean.replace(/^[!#_\[\]\s\-]+|[!#_\[\]\s\-]+$/g, "");
        clean = clean.replace(/[\[\]\(\)]/g, " ").trim();
        return clean || name;
    }

    async function fetchFiles() {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        try {
            const response = await fetch(url);
            const data = await response.json();

            if (!Array.isArray(data)) {
                document.getElementById('fileCount').innerText = "Erro: Pasta não encontrada.";
                document.getElementById('loader').style.display = 'none';
                document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 50px;">❌ Pasta de texturas não encontrada</div>';
                return;
            }

            allFiles = data
                .filter(item => item.type === 'file')
                .map(file => ({
                    ...file,
                    displayName: sanitizeName(file.name)
                }));

            document.getElementById('loader').style.display = 'none';

            if (allFiles.length === 0) {
                document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #888aaa; padding: 50px;">📁 Nenhuma textura encontrada</div>';
            }

            render(allFiles);
            showToast(`✅ ${allFiles.length} texturas carregadas!`, "#a47de8");

        } catch (error) {
            console.error("Erro na API:", error);
            document.getElementById('fileCount').innerText = "Erro de conexão.";
            document.getElementById('loader').style.display = 'none';
            document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 50px;">❌ Erro ao conectar com GitHub</div>';
            showToast("Erro de conexão!", "#e74c3c");
        }
    }

    function getIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (['zip', 'rar', '7z'].includes(ext)) return '📦';
        if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) return '🖼️';
        if (ext === 'json') return '⚙️';
        if (ext === 'mcmeta') return '🎨';
        return '📄';
    }

    function handleDownload(url, filename) {
        showDownloadModal(url, filename);
    }

    function render(files) {
        const catalog = document.getElementById('catalog');
        const count = document.getElementById('fileCount');

        catalog.innerHTML = '';
        count.innerText = `${files.length} TEXTURAS ENCONTRADAS`;

        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'file-card';

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.innerHTML = '📥 DOWNLOAD';
            downloadBtn.onclick = () => handleDownload(file.download_url, file.name);

            card.innerHTML = `
                <div>
                    <span class="file-icon">${getIcon(file.name)}</span>
                    <div class="file-display-name">${escapeHtml(file.displayName)}</div>
                    <div class="file-raw-name">${escapeHtml(file.name)}</div>
                </div>
            `;

            card.appendChild(downloadBtn);
            catalog.appendChild(card);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function filterFiles() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allFiles.filter(f =>
            f.displayName.toLowerCase().includes(term) ||
            f.name.toLowerCase().includes(term)
        );
        render(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterFiles);

    fetchFiles();
</script>

</body>
</html>

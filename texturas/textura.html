<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Texturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #55FF55; /* Verde clássico Minecraft */
            --accent: #00E5FF;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            /* Imagem de fundo temática com overlay escuro */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://preview.redd.it/f67g5xwdx1u71.jpg?width=1080&crop=smart&auto=webp&s=a2555349327827c41b2ed48cd22e96fa1f2875d3');
            background-attachment: fixed;
            background-size: cover;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(85, 255, 85, 0.4);
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        /* BUSCA */
        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 18px 25px;
            border-radius: 15px;
            border: 2px solid #333;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(85, 255, 85, 0.2);
        }

        .stats {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
        }

        /* GRID DE ARQUIVOS */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding: 20px 0 60px;
        }

        .file-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .file-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .file-icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: block;
        }

        .file-display-name {
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .file-raw-name {
            font-size: 11px;
            color: #666;
            margin-bottom: 20px;
            font-family: monospace;
        }

        /* BOTÃO */
        .btn-download {
            background: var(--primary);
            color: #000;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
            border-bottom: 4px solid #388e3c;
        }

        .btn-download:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-download:active {
            border-bottom: 0;
            transform: translateY(4px);
        }

        /* ANIMAÇÃO DE CARREGAMENTO */
        #loader {
            width: 50px;
            height: 50px;
            background-color: var(--primary);
            margin: 100px auto;
            animation: cube-rotate 1.2s infinite ease-in-out;
            box-shadow: 0 0 15px var(--primary);
        }

        @keyframes cube-rotate {
            0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); }
            50% { transform: perspective(120px) rotateX(-180.1deg) rotateY(0deg); }
            100% { transform: perspective(120px) rotateX(-180deg) rotateY(-179.9deg); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 18px; }
            .catalog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Space Texturas</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar textura..." onkeyup="filterFiles()">
        <div class="stats" id="fileCount">Lendo arquivos...</div>
    </div>
</div>

<div id="loader"></div>

<div id="catalog" class="catalog-grid"></div>

<script>
    // Configurações do seu GitHub
    const CONFIG = {
        owner: 'kauan9192gg',
        repo: 'sj_minecraft',
        path: 'texturas' 
    };

    let allFiles = [];

    // LÓGICA DE LIMPEZA DE NOME (Remove símbolos, cores e extensões)
    function sanitizeName(name) {
        let clean = name;

        // 1. Remove extensão (.zip, .rar, etc)
        clean = clean.replace(/\.[^/.]+$/, "");

        // 2. Remove códigos de cores do Minecraft (§ e o caractere seguinte)
        clean = clean.replace(/§./g, "");

        // 3. Remove símbolos chatos ([ ], ! , _ , #, ( ), -)
        // Isso limpa o início e o fim do nome de caracteres especiais
        clean = clean.replace(/^[!#_\[\]\s\-]+|[!#_\[\]\s\-]+$/g, "");

        // 4. Limpa colchetes e parênteses que ficaram no meio
        clean = clean.replace(/[\[\]\(\)]/g, " ").trim();

        // 5. Retorna o nome limpo ou o original caso fique vazio
        return clean || name;
    }

    // BUSCA OS DADOS NA API DO GITHUB
    async function fetchFiles() {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();

            if (!Array.isArray(data)) {
                document.getElementById('fileCount').innerText = "Erro: Pasta não encontrada.";
                return;
            }

            // Organiza os arquivos e limpa os nomes
            allFiles = data
                .filter(item => item.type === 'file')
                .map(file => ({
                    ...file,
                    displayName: sanitizeName(file.name)
                }));

            document.getElementById('loader').style.display = 'none';
            render(allFiles);

        } catch (error) {
            console.error("Erro na API:", error);
            document.getElementById('fileCount').innerText = "Erro de conexão.";
        }
    }

    function getIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (['zip', 'rar', '7z'].includes(ext)) return '📦';
        if (['png', 'jpg', 'jpeg'].includes(ext)) return '🖼️';
        if (ext === 'json') return '⚙️';
        return '📄';
    }

    function render(files) {
        const catalog = document.getElementById('catalog');
        const count = document.getElementById('fileCount');
        
        catalog.innerHTML = '';
        count.innerText = `${files.length} TEXTURAS ENCONTRADAS`;

        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'file-card';
            card.innerHTML = `
                <div>
                    <span class="file-icon">${getIcon(file.name)}</span>
                    <div class="file-display-name">${file.displayName}</div>
                    <div class="file-raw-name">${file.name}</div>
                </div>
                <a href="${file.download_url}" class="btn-download" target="_blank">Download</a>
            `;
            catalog.appendChild(card);
        });
    }

    // FILTRO EM TEMPO REAL
    function filterFiles() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allFiles.filter(f => 
            f.displayName.toLowerCase().includes(term) || 
            f.name.toLowerCase().includes(term)
        );
        render(filtered);
    }

    // Inicia o site
    fetchFiles();
</script>

</body>
</html>

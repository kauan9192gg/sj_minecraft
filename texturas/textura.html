<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Texturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .header { text-align: center; padding: 30px 20px 20px; background: linear-gradient(to bottom, rgba(10,10,20,0.95), transparent); }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 20px; color: #a47de8; margin-bottom: 15px; }
        .search-container { max-width: 600px; margin: 0 auto; }
        #searchInput {
            width: 100%; padding: 15px 20px; border-radius: 12px;
            border: 1.5px solid rgba(124, 92, 191, 0.25);
            background: rgba(20, 20, 40, 0.8); color: white; font-size: 14px;
        }
        #searchInput:focus { outline: none; border-color: #a47de8; }
        .stats { margin-top: 12px; font-size: 10px; color: #888aaa; font-family: 'Press Start 2P', cursive; text-align: center; }
        .content-wrapper { padding: 20px; max-height: calc(100vh - 180px); overflow-y: auto; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .file-card {
            background: rgba(26, 26, 50, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(124, 92, 191, 0.2); border-radius: 20px;
            padding: 20px; transition: all 0.3s;
        }
        .file-card:hover { transform: translateY(-5px); background: rgba(35, 35, 65, 0.95); border-color: rgba(164, 125, 232, 0.5); }
        .file-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .file-display-name { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .file-raw-name { font-size: 10px; color: #555577; margin-bottom: 15px; font-family: monospace; }
        .btn-download {
            background: #7c5cbf; color: #fff; text-align: center; padding: 12px;
            border-radius: 10px; font-weight: 700; text-transform: uppercase; font-size: 11px;
            border: none; cursor: pointer; width: 100%;
        }
        .btn-download:hover { background: #a47de8; transform: scale(1.02); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: rgba(13, 13, 26, 0.97); border: 1.5px solid rgba(164, 125, 232, 0.4);
            border-radius: 24px; padding: 30px; max-width: 400px; width: 90%; text-align: center;
        }
        .modal-title { font-family: 'Press Start 2P', cursive; font-size: 16px; color: #a47de8; margin-bottom: 15px; }
        .modal-filename {
            background: rgba(164, 125, 232, 0.06); padding: 15px; border-radius: 12px;
            margin: 20px 0; font-size: 14px; word-break: break-all;
            border: 1px solid rgba(124, 92, 191, 0.2);
        }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 15px; border-radius: 12px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-minecraft { background: #7c5cbf; color: white; }
        .btn-custom { background: #2d3a6b; color: white; }
        .modal-footer { margin-top: 15px; font-size: 11px; color: #888aaa; }
        #loader { width: 36px; height: 36px; background-color: #7c5cbf; margin: 50px auto; animation: spin 1s infinite; border-radius: 4px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast {
            visibility: hidden; min-width: 200px; background-color: #7c5cbf; color: white;
            text-align: center; border-radius: 10px; padding: 12px 20px;
            position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
            z-index: 10001; opacity: 0; transition: opacity 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; }
        @media (max-width: 600px) { h1 { font-size: 16px; } .catalog-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>📦 TEXTURAS</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar textura...">
        <div class="stats" id="fileCount">Lendo arquivos...</div>
    </div>
</div>

<div class="content-wrapper">
    <div id="loader"></div>
    <div id="catalog" class="catalog-grid"></div>
</div>

<div id="downloadModal" class="modal-overlay">
    <div class="modal-content">
        <span style="font-size: 60px;">📥</span>
        <h2 class="modal-title">ESCOLHA O DESTINO</h2>
        <div id="modalFilename" class="modal-filename"></div>
        <div class="modal-buttons">
            <button id="saveMinecraftBtn" class="modal-btn btn-minecraft">📦 SALVAR EM .MINECRAFT</button>
            <button id="saveCustomBtn" class="modal-btn btn-custom">📁 SALVAR EM OUTRO LUGAR</button>
        </div>
        <div class="modal-footer">Selecione onde deseja salvar a textura</div>
    </div>
</div>

<div id="toast"></div>

<script>
    var CONFIG = { owner: 'kauan9192gg', repo: 'sj_minecraft', path: 'texturas' };
    var allFiles = [];
    var currentDownloadUrl = '';
    var currentFilename = '';

    function callPythonDownload(url, filename, saveType) {
        if (typeof window.downloadTexture === 'function') {
            window.downloadTexture(url, filename, saveType);
            return true;
        }
        if (window.pywebview && window.pywebview.api && window.pywebview.api.baixar_textura) {
            window.pywebview.api.baixar_textura(url, filename, saveType);
            return true;
        }
        console.error("No bridge available");
        return false;
    }

    function showDownloadModal(url, filename) {
        currentDownloadUrl = url;
        currentFilename = filename;
        document.getElementById('modalFilename').innerText = filename;
        document.getElementById('downloadModal').style.display = 'flex';
        document.querySelector('.content-wrapper').style.filter = 'blur(4px)';
        document.querySelector('.header').style.filter = 'blur(4px)';
    }

    function closeModal() {
        document.getElementById('downloadModal').style.display = 'none';
        document.querySelector('.content-wrapper').style.filter = 'none';
        document.querySelector('.header').style.filter = 'none';
    }

    function downloadToMinecraft() {
        var filename = currentFilename, url = currentDownloadUrl;
        closeModal();
        showToast("⏬ Baixando para Minecraft...");
        if (callPythonDownload(url, filename, "minecraft")) {
            showToast("✅ Download iniciado! Verifique a aba Downloads", "#43b581");
        } else {
            showToast("❌ Erro ao comunicar com o app", "#e74c3c");
        }
    }

    function downloadCustom() {
        var filename = currentFilename, url = currentDownloadUrl;
        closeModal();
        showToast("⏬ Escolha onde salvar...");
        if (callPythonDownload(url, filename, "custom")) {
            showToast("✅ Selecione a pasta na janela que irá abrir", "#43b581");
        } else {
            showToast("❌ Erro ao comunicar com o app", "#e74c3c");
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('downloadModal').style.display === 'flex') closeModal();
    });
    document.getElementById('downloadModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.getElementById('saveMinecraftBtn').addEventListener('click', downloadToMinecraft);
    document.getElementById('saveCustomBtn').addEventListener('click', downloadCustom);

    function showToast(msg, color) {
        color = color || "#a47de8";
        var toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.className = "show";
        setTimeout(function() { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function sanitizeName(name) {
        var clean = name.replace(/\.[^/.]+$/, "").replace(/§./g, "").replace(/^[!#_\[\]\s\-]+|[!#_\[\]\s\-]+$/g, "").replace(/[\[\]\(\)]/g, " ").trim();
        return clean || name;
    }

    async function fetchFiles() {
        var url = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo + "/contents/" + CONFIG.path;
        try {
            var response = await fetch(url);
            if (!response.ok) throw new Error("HTTP " + response.status);
            var data = await response.json();
            if (!Array.isArray(data)) throw new Error("Invalid response");
            
            // 🔥 FILTRO PRINCIPAL: Remove TODOS os arquivos .html (incluindo textura.html)
            allFiles = data
                .filter(function(item) { 
                    // Só arquivos (não pastas) e que NÃO terminam com .html
                    return item.type === 'file' && !item.name.toLowerCase().endsWith('.html');
                })
                .map(function(file) {
                    return { download_url: file.download_url, name: file.name, displayName: sanitizeName(file.name) };
                });
            
            document.getElementById('loader').style.display = 'none';
            if (allFiles.length === 0) {
                document.getElementById('catalog').innerHTML = '<div style="text-align:center;color:#888aaa;padding:50px;">📁 Nenhuma textura encontrada</div>';
            } else {
                render(allFiles);
            }
            showToast("✅ " + allFiles.length + " texturas carregadas!");
        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('catalog').innerHTML = '<div style="text-align:center;color:#e74c3c;padding:50px;">❌ Erro ao conectar<br><small>' + error.message + '</small></div>';
            showToast("Erro de conexão!", "#e74c3c");
        }
    }

    function getIcon(filename) {
        var ext = filename.split('.').pop().toLowerCase();
        if (ext === 'zip' || ext === 'rar' || ext === '7z') return '📦';
        if (ext === 'png' || ext === 'jpg' || ext === 'jpeg' || ext === 'gif' || ext === 'webp') return '🖼️';
        if (ext === 'json') return '⚙️';
        if (ext === 'mcmeta') return '🎨';
        return '📄';
    }

    function render(files) {
        var catalog = document.getElementById('catalog');
        var count = document.getElementById('fileCount');
        catalog.innerHTML = '';
        count.innerText = files.length + " TEXTURAS ENCONTRADAS";
        
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var card = document.createElement('div');
            card.className = 'file-card';
            
            var downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.innerHTML = '📥 DOWNLOAD';
            downloadBtn.onclick = (function(url, name) {
                return function() { showDownloadModal(url, name); };
            })(file.download_url, file.name);
            
            card.innerHTML = '<div><span class="file-icon">' + getIcon(file.name) + '</span>' +
                '<div class="file-display-name">' + escapeHtml(file.displayName) + '</div>' +
                '<div class="file-raw-name">' + escapeHtml(file.name) + '</div></div>';
            card.appendChild(downloadBtn);
            catalog.appendChild(card);
        }
    }

    function escapeHtml(text) { var div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function filterFiles() {
        var term = document.getElementById('searchInput').value.toLowerCase();
        var filtered = [];
        for (var i = 0; i < allFiles.length; i++) {
            var f = allFiles[i];
            if (f.displayName.toLowerCase().indexOf(term) !== -1 || f.name.toLowerCase().indexOf(term) !== -1) {
                filtered.push(f);
            }
        }
        render(filtered);
        document.getElementById('fileCount').innerText = filtered.length + " TEXTURAS ENCONTRADAS";
    }

    document.getElementById('searchInput').addEventListener('input', filterFiles);
    fetchFiles();
</script>
</body>
</html>

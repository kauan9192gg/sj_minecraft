<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Texturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a47de8;
            --primary-dark: #7c5cbf;
            --accent: #c9a7ff;
            --bg-dark: #0d0d1a;
            --card-bg: rgba(26, 26, 50, 0.85);
            --card-bg-hover: rgba(35, 35, 65, 0.95);
            --border: rgba(124, 92, 191, 0.2);
            --border-hover: rgba(164, 125, 232, 0.5);
            --modal-bg: rgba(13, 13, 26, 0.97);
            --text-muted: #888aaa;
            --text-dim: #555577;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(124, 92, 191, 0.06) 0%, transparent 60%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(10,10,20,0.95), transparent);
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(164, 125, 232, 0.35);
            margin-bottom: 15px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1.5px solid rgba(124, 92, 191, 0.25);
            background: rgba(20, 20, 40, 0.8);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(164, 125, 232, 0.18);
        }

        .stats {
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Press Start 2P', cursive;
        }

        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 30px;
            width: 100%;
            box-sizing: border-box;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .file-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.35s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .file-card:hover {
            transform: translateY(-5px);
            background: var(--card-bg-hover);
            border-color: var(--border-hover);
            box-shadow: 0 12px 40px rgba(124, 92, 191, 0.2);
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .file-display-name {
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .file-raw-name {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-family: monospace;
        }

        .btn-download {
            background: var(--primary-dark);
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(164, 125, 232, 0.35);
            cursor: pointer;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .btn-download:hover {
            background: var(--primary);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1.5px solid rgba(164, 125, 232, 0.4);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .modal-filename {
            background: rgba(164, 125, 232, 0.06);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            color: #fff;
            word-break: break-all;
            border: 1px solid var(--border);
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }

        .btn-minecraft { background: var(--primary-dark); color: white; }
        .btn-custom { background: #2d3a6b; color: white; }

        .modal-footer {
            margin-top: 15px;
            font-size: 11px;
            color: var(--text-muted);
        }

        #loader {
            width: 36px;
            height: 36px;
            background-color: var(--primary-dark);
            margin: 50px auto;
            animation: cube-rotate 1.2s infinite ease-in-out;
            border-radius: 4px;
        }

        @keyframes cube-rotate {
            0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); }
            50% { transform: perspective(120px) rotateX(-180.1deg) rotateY(0deg); }
            100% { transform: perspective(120px) rotateX(-180deg) rotateY(-179.9deg); }
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--primary-dark);
            color: white;
            text-align: center;
            border-radius: 10px;
            padding: 12px 20px;
            position: fixed;
            left: 50%; bottom: 30px;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: bold;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #toast.show { visibility: visible; opacity: 1; }

        @media (max-width: 600px) {
            h1 { font-size: 16px; }
            .catalog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📦 TEXTURAS</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar textura...">
        <div class="stats" id="fileCount">Lendo arquivos...</div>
    </div>
</div>

<div class="content-wrapper">
    <div id="loader"></div>
    <div id="catalog" class="catalog-grid"></div>
</div>

<div id="downloadModal" class="modal-overlay">
    <div class="modal-content">
        <span style="font-size: 60px;">📥</span>
        <h2 class="modal-title">ESCOLHA O DESTINO</h2>
        <div id="modalFilename" class="modal-filename"></div>
        <div class="modal-buttons">
            <button id="saveMinecraftBtn" class="modal-btn btn-minecraft">📦 SALVAR EM .MINECRAFT</button>
            <button id="saveCustomBtn" class="modal-btn btn-custom">📁 SALVAR EM OUTRO LUGAR</button>
        </div>
        <div class="modal-footer">Selecione onde deseja salvar a textura</div>
    </div>
</div>

<div id="toast"></div>

<script>
    // CONFIGURAÇÃO
    var CONFIG = {
        owner: 'kauan9192gg',
        repo: 'sj_minecraft',
        path: 'texturas'
    };

    var allFiles = [];
    var currentDownloadUrl = '';
    var currentFilename = '';

    // ========== COMUNICAÇÃO COM PYTHON ==========
    // Usa o objeto exposto pelo Python (sem QWebChannel)
    function callPythonDownload(url, filename, saveType) {
        console.log("Chamando Python:", url, filename, saveType);
        
        // Método 1: Se o Python expôs uma função global
        if (typeof window.downloadTexture === 'function') {
            window.downloadTexture(url, filename, saveType);
            return true;
        }
        
        // Método 2: Se o Python injetou um objeto
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.baixar_textura === 'function') {
            window.pywebview.api.baixar_textura(url, filename, saveType);
            return true;
        }
        
        // Método 3: Usar URL customizada (webkit message)
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.downloadTexture) {
            window.webkit.messageHandlers.downloadTexture.postMessage({
                url: url,
                filename: filename,
                saveType: saveType
            });
            return true;
        }
        
        console.error("Nenhum método de comunicação com Python disponível");
        return false;
    }

    // ========== FUNÇÕES DO MODAL ==========
    function showDownloadModal(url, filename) {
        currentDownloadUrl = url;
        currentFilename = filename;
        document.getElementById('modalFilename').innerText = filename;
        document.getElementById('downloadModal').style.display = 'flex';
        document.querySelector('.content-wrapper').style.filter = 'blur(4px)';
        document.querySelector('.header').style.filter = 'blur(4px)';
    }

    function closeModal() {
        document.getElementById('downloadModal').style.display = 'none';
        document.querySelector('.content-wrapper').style.filter = 'none';
        document.querySelector('.header').style.filter = 'none';
    }

    function downloadToMinecraft() {
        var filename = currentFilename;
        var url = currentDownloadUrl;
        
        closeModal();
        showToast("⏬ Baixando para Minecraft...");
        
        var success = callPythonDownload(url, filename, "minecraft");
        if (success) {
            showToast("✅ Download iniciado! Verifique a aba Downloads", "#43b581");
        } else {
            showToast("❌ Não foi possível comunicar com o aplicativo", "#e74c3c");
            // Fallback: abrir link no navegador
            window.open(url, '_blank');
        }
    }

    function downloadCustom() {
        var filename = currentFilename;
        var url = currentDownloadUrl;
        
        closeModal();
        showToast("⏬ Escolha onde salvar...");
        
        var success = callPythonDownload(url, filename, "custom");
        if (success) {
            showToast("✅ Selecione a pasta na janela que irá abrir", "#43b581");
        } else {
            showToast("❌ Não foi possível comunicar com o aplicativo", "#e74c3c");
            window.open(url, '_blank');
        }
    }

    // ========== EVENTOS ==========
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('downloadModal').style.display === 'flex') {
            closeModal();
        }
    });

    document.getElementById('downloadModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.getElementById('saveMinecraftBtn').addEventListener('click', downloadToMinecraft);
    document.getElementById('saveCustomBtn').addEventListener('click', downloadCustom);

    // ========== TOAST ==========
    function showToast(msg, color) {
        color = color || "#a47de8";
        var toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.className = "show";
        setTimeout(function() {
            toast.className = toast.className.replace("show", "");
        }, 3000);
    }

    // ========== SANITIZAÇÃO ==========
    function sanitizeName(name) {
        var clean = name;
        clean = clean.replace(/\.[^/.]+$/, "");
        clean = clean.replace(/§./g, "");
        clean = clean.replace(/^[!#_\[\]\s\-]+|[!#_\[\]\s\-]+$/g, "");
        clean = clean.replace(/[\[\]\(\)]/g, " ").trim();
        return clean || name;
    }

    // ========== BUSCAR ARQUIVOS ==========
    async function fetchFiles() {
        var url = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo + "/contents/" + CONFIG.path;
        
        try {
            var response = await fetch(url);
            
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            
            var data = await response.json();

            if (!Array.isArray(data)) {
                document.getElementById('fileCount').innerText = "Erro: Pasta não encontrada.";
                document.getElementById('loader').style.display = 'none';
                document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 50px;">❌ Pasta de texturas não encontrada</div>';
                return;
            }

            allFiles = data.filter(function(item) {
                return item.type === 'file';
            }).map(function(file) {
                return {
                    download_url: file.download_url,
                    name: file.name,
                    displayName: sanitizeName(file.name)
                };
            });

            document.getElementById('loader').style.display = 'none';

            if (allFiles.length === 0) {
                document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #888aaa; padding: 50px;">📁 Nenhuma textura encontrada</div>';
            } else {
                render(allFiles);
            }
            
            showToast("✅ " + allFiles.length + " texturas carregadas!");

        } catch (error) {
            console.error("Erro:", error);
            document.getElementById('fileCount').innerText = "Erro de conexão.";
            document.getElementById('loader').style.display = 'none';
            document.getElementById('catalog').innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 50px;">❌ Erro ao conectar com GitHub<br><small>' + error.message + '</small></div>';
            showToast("Erro de conexão!", "#e74c3c");
        }
    }

    // ========== ÍCONES ==========
    function getIcon(filename) {
        var ext = filename.split('.').pop().toLowerCase();
        if (ext === 'zip' || ext === 'rar' || ext === '7z') return '📦';
        if (ext === 'png' || ext === 'jpg' || ext === 'jpeg' || ext === 'gif' || ext === 'webp') return '🖼️';
        if (ext === 'json') return '⚙️';
        if (ext === 'mcmeta') return '🎨';
        return '📄';
    }

    // ========== RENDERIZAR ==========
    function render(files) {
        var catalog = document.getElementById('catalog');
        var count = document.getElementById('fileCount');

        catalog.innerHTML = '';
        count.innerText = files.length + " TEXTURAS ENCONTRADAS";

        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var card = document.createElement('div');
            card.className = 'file-card';

            var downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.innerHTML = '📥 DOWNLOAD';
            downloadBtn.onclick = (function(url, name) {
                return function() { showDownloadModal(url, name); };
            })(file.download_url, file.name);

            var iconSpan = document.createElement('span');
            iconSpan.className = 'file-icon';
            iconSpan.innerText = getIcon(file.name);

            var nameDiv = document.createElement('div');
            nameDiv.className = 'file-display-name';
            nameDiv.innerText = file.displayName;

            var rawDiv = document.createElement('div');
            rawDiv.className = 'file-raw-name';
            rawDiv.innerText = file.name;

            var infoDiv = document.createElement('div');
            infoDiv.appendChild(iconSpan);
            infoDiv.appendChild(nameDiv);
            infoDiv.appendChild(rawDiv);

            card.appendChild(infoDiv);
            card.appendChild(downloadBtn);
            catalog.appendChild(card);
        }
    }

    // ========== FILTRO ==========
    function filterFiles() {
        var term = document.getElementById('searchInput').value.toLowerCase();
        var filtered = [];
        for (var i = 0; i < allFiles.length; i++) {
            var f = allFiles[i];
            if (f.displayName.toLowerCase().indexOf(term) !== -1 || f.name.toLowerCase().indexOf(term) !== -1) {
                filtered.push(f);
            }
        }
        render(filtered);
        document.getElementById('fileCount').innerText = filtered.length + " TEXTURAS ENCONTRADAS";
    }

    document.getElementById('searchInput').addEventListener('input', filterFiles);

    // INICIAR
    fetchFiles();
</script>

</body>
</html>
